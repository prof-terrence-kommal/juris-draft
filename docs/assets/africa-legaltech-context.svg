<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#032F2A"/>
      <stop offset="1" stop-color="#0A5C47"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0C5E49"/>
      <stop offset="1" stop-color="#094638"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#001D18" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1600" height="900" rx="42" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g opacity="0.08">
    <path d="M80 140H1520" stroke="white"/>
    <path d="M80 240H1520" stroke="white"/>
    <path d="M80 340H1520" stroke="white"/>
    <path d="M80 440H1520" stroke="white"/>
    <path d="M80 540H1520" stroke="white"/>
    <path d="M80 640H1520" stroke="white"/>
    <path d="M80 740H1520" stroke="white"/>
    <path d="M180 80V820" stroke="white"/>
    <path d="M380 80V820" stroke="white"/>
    <path d="M580 80V820" stroke="white"/>
    <path d="M780 80V820" stroke="white"/>
    <path d="M980 80V820" stroke="white"/>
    <path d="M1180 80V820" stroke="white"/>
    <path d="M1380 80V820" stroke="white"/>
  </g>

  <!-- title -->
  <text x="90" y="135" fill="#F2F8F5" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="700">
    <tspan x="90" dy="0">Open LegalTech for</tspan>
    <tspan x="90" dy="78">African and Global South contexts</tspan>
  </text>

  <!-- subtitle -->
  <text x="92" y="270" fill="#B9F2D7" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="500">
    Model-agnostic • jurisdiction-aware • human-review-first
  </text>

  <!-- cards -->
  <g filter="url(#shadow)">
    <rect x="92" y="355" width="440" height="178" rx="24" fill="url(#panel)" stroke="#2EE6A6" stroke-width="2"/>
    <text x="132" y="420" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Localisation</text>
    <text x="132" y="470" fill="#E5FFF4" font-family="Arial, Helvetica, sans-serif" font-size="24">
      <tspan x="132" dy="0">Profiles for jurisdiction,</tspan>
      <tspan x="132" dy="36">terminology, and review notes.</tspan>
    </text>

    <rect x="92" y="565" width="440" height="178" rx="24" fill="url(#panel)" stroke="#2EE6A6" stroke-width="2"/>
    <text x="132" y="630" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Access</text>
    <text x="132" y="680" fill="#E5FFF4" font-family="Arial, Helvetica, sans-serif" font-size="24">
      <tspan x="132" dy="0">Open workflows for cloud,</tspan>
      <tspan x="132" dy="36">local, or hybrid AI deployment.</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="570" y="355" width="440" height="178" rx="24" fill="url(#panel)" stroke="#2EE6A6" stroke-width="2"/>
    <text x="610" y="420" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Human review</text>
    <text x="610" y="470" fill="#E5FFF4" font-family="Arial, Helvetica, sans-serif" font-size="24">
      <tspan x="610" dy="0">Generated outputs remain</tspan>
      <tspan x="610" dy="36">checkable, limited, and reviewable.</tspan>
    </text>

    <rect x="570" y="565" width="440" height="178" rx="24" fill="url(#panel)" stroke="#2EE6A6" stroke-width="2"/>
    <text x="610" y="630" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Global South fit</text>
    <text x="610" y="680" fill="#E5FFF4" font-family="Arial, Helvetica, sans-serif" font-size="24">
      <tspan x="610" dy="0">Built for adaptable legal workflows</tspan>
      <tspan x="610" dy="36">in under-resourced environments.</tspan>
    </text>
  </g>

  <!-- map panel -->
  <g filter="url(#shadow)">
    <rect x="1060" y="180" width="450" height="500" rx="36" fill="#0C4F3F" fill-opacity="0.8" stroke="#2EE6A6" stroke-width="2"/>
    <text x="1105" y="240" fill="#EFFFF7" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">African LegalTech context</text>
    <text x="1105" y="280" fill="#B9F2D7" font-family="Arial, Helvetica, sans-serif" font-size="21">
      South Africa highlighted as the starting point
    </text>

    <!-- simplified Africa silhouette -->
    <g transform="translate(1120,310)">
      <path d="M149 10
               L205 30
               L260 67
               L297 120
               L286 165
               L315 212
               L302 270
               L262 330
               L237 384
               L207 429
               L170 455
               L131 440
               L106 398
               L76 363
               L62 316
               L38 282
               L22 240
               L31 194
               L53 156
               L50 118
               L74 90
               L111 72
               L128 42
               Z"
            fill="#BFEFD1" opacity="0.98"/>

      <!-- horn / east coast shape accent -->
      <path d="M286 165 L332 173 L320 208 L302 270 Z" fill="#A4E7BE"/>

      <!-- southern Africa / South Africa highlight -->
      <path d="M136 408
               L175 400
               L203 417
               L199 442
               L168 456
               L135 446
               L122 425
               Z"
            fill="#1FBE61"/>

      <!-- Lesotho-ish inner dot accent -->
      <circle cx="169" cy="428" r="5" fill="#0E5C36"/>

      <!-- subtle outline -->
      <path d="M149 10
               L205 30
               L260 67
               L297 120
               L286 165
               L315 212
               L302 270
               L262 330
               L237 384
               L207 429
               L170 455
               L131 440
               L106 398
               L76 363
               L62 316
               L38 282
               L22 240
               L31 194
               L53 156
               L50 118
               L74 90
               L111 72
               L128 42
               Z"
            fill="none" stroke="#0E5B47" stroke-width="4"/>
    </g>

    <!-- callout -->
    <g>
      <line x1="1288" y1="662" x2="1415" y2="706" stroke="#2EE6A6" stroke-width="3"/>
      <circle cx="1288" cy="662" r="7" fill="#2EE6A6"/>
      <rect x="1412" y="682" width="82" height="40" rx="12" fill="#1FBE61"/>
      <text x="1432" y="709" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">ZA</text>
    </g>
  </g>

  <!-- footer statement -->
  <text x="92" y="815" fill="#CFF7E3" font-family="Arial, Helvetica, sans-serif" font-size="28">
    Juris Draft starts from South African LegalTech needs while remaining adaptable across jurisdictions.
  </text>
</svg>
