<svg width="1600" height="720" viewBox="0 0 1600 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Open LegalTech for African and Global South contexts</title>
  <desc id="desc">A README hero banner for Juris Draft showing an Africa map and South African LegalTech positioning.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#052e2b"/>
      <stop offset="1" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0f766e"/>
      <stop offset="1" stop-color="#065f46"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#001f1a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="720" rx="42" fill="url(#bg)"/>

  <g opacity="0.10">
    <path d="M100 145H1500M100 285H1500M100 425H1500M100 565H1500" stroke="#d1fae5"/>
    <path d="M240 80V640M440 80V640M640 80V640M840 80V640M1040 80V640M1240 80V640M1440 80V640" stroke="#d1fae5"/>
  </g>

  <text x="90" y="125" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800" fill="#ecfdf5">
    <tspan x="90" dy="0">Open LegalTech for African</tspan>
    <tspan x="90" dy="68">and Global South contexts</tspan>
  </text>

  <text x="92" y="245" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#bbf7d0">
    Model-agnostic · jurisdiction-aware · human-review-first
  </text>

  <g filter="url(#softShadow)">
    <rect x="90" y="315" width="335" height="128" rx="22" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <text x="120" y="365" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#ffffff">Localisation</text>
    <text x="120" y="405" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#dcfce7">
      <tspan x="120" dy="0">Jurisdiction profiles,</tspan>
      <tspan x="120" dy="28">terminology, review notes.</tspan>
    </text>

    <rect x="455" y="315" width="335" height="128" rx="22" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <text x="485" y="365" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#ffffff">Access</text>
    <text x="485" y="405" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#dcfce7">
      <tspan x="485" dy="0">Cloud, local, or hybrid</tspan>
      <tspan x="485" dy="28">AI deployment paths.</tspan>
    </text>

    <rect x="90" y="475" width="335" height="128" rx="22" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <text x="120" y="525" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#ffffff">Human review</text>
    <text x="120" y="565" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#dcfce7">
      <tspan x="120" dy="0">Outputs stay checkable,</tspan>
      <tspan x="120" dy="28">limited, and reviewable.</tspan>
    </text>

    <rect x="455" y="475" width="335" height="128" rx="22" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <text x="485" y="525" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#ffffff">Source assist</text>
    <text x="485" y="565" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#dcfce7">
      <tspan x="485" dy="0">SAFLII, AfricanLII,</tspan>
      <tspan x="485" dy="28">LawLibrary research links.</tspan>
    </text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="875" y="115" width="610" height="505" rx="34" fill="#083c35" stroke="#34d399" stroke-width="2"/>

    <text x="920" y="175" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800" fill="#ecfdf5">
      Built from South Africa
    </text>
    <text x="920" y="215" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#bbf7d0">
      for open, inspectable legal AI workflows
    </text>

    <image href="simplemaps-africa.svg" x="965" y="250" width="360" height="310" opacity="0.92"/>

    <circle cx="1158" cy="525" r="10" fill="#22c55e"/>
    <line x1="1160" y1="525" x2="1375" y2="578" stroke="#34d399" stroke-width="4"/>
    <rect x="1365" y="555" width="82" height="46" rx="14" fill="#16a34a"/>
    <text x="1388" y="585" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#ffffff">ZA</text>
  </g>

  <text x="92" y="665" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#a7f3d0">
    Juris Draft starts from South African LegalTech needs while remaining adaptable across jurisdictions.
  </text>
</svg>
