<svg width="1100" height="540" viewBox="0 0 1100 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Juris Draft Workflow</title>
  <desc id="desc">A workflow diagram showing facts, profiles, recipes, source links, and human review.</desc>

  <rect width="1100" height="540" rx="26" fill="#f8fafc"/>
  <text x="60" y="68" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Juris Draft workflow</text>
  <text x="60" y="104" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Structured drafting packets + source-assist links + human review</text>

  <rect x="60" y="155" width="190" height="90" rx="16" fill="#dbeafe" stroke="#2563eb"/>
  <text x="88" y="192" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#1e3a8a">Facts</text>
  <text x="88" y="222" font-family="Inter, Arial, sans-serif" font-size="15" fill="#1e40af">JSON matter inputs</text>

  <rect x="60" y="285" width="190" height="90" rx="16" fill="#dcfce7" stroke="#16a34a"/>
  <text x="88" y="322" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#14532d">Profiles</text>
  <text x="88" y="352" font-family="Inter, Arial, sans-serif" font-size="15" fill="#166534">Jurisdiction + tone</text>

  <rect x="60" y="415" width="190" height="90" rx="16" fill="#fef3c7" stroke="#d97706"/>
  <text x="88" y="452" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#78350f">Recipes</text>
  <text x="88" y="482" font-family="Inter, Arial, sans-serif" font-size="15" fill="#92400e">Draft structures</text>

  <path d="M270 200 H405" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M270 330 H405" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M270 460 H405" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="425" y="225" width="250" height="160" rx="20" fill="#0f172a"/>
  <text x="468" y="278" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#ffffff">Juris Draft</text>
  <text x="468" y="316" font-family="Inter, Arial, sans-serif" font-size="17" fill="#cbd5e1">Drafting engine</text>
  <text x="468" y="344" font-family="Inter, Arial, sans-serif" font-size="17" fill="#cbd5e1">Source assistant</text>

  <path d="M690 305 H790" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="810" y="155" width="230" height="95" rx="18" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="842" y="194" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#4c1d95">Draft packet</text>
  <text x="842" y="224" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5b21b6">Markdown output</text>

  <rect x="810" y="285" width="230" height="95" rx="18" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="842" y="324" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#134e4a">Source links</text>
  <text x="842" y="354" font-family="Inter, Arial, sans-serif" font-size="15" fill="#115e59">SA public research</text>

  <rect x="810" y="415" width="230" height="95" rx="18" fill="#fee2e2" stroke="#dc2626"/>
  <text x="842" y="454" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#7f1d1d">Human review</text>
  <text x="842" y="484" font-family="Inter, Arial, sans-serif" font-size="15" fill="#991b1b">No legal advice</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
